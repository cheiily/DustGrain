app_info:
  name: "DustGrain"
  version: "3.0.0"
  author: "cheily"

cache:
  version: 1
  max_age_seconds: 86400

client:
  url: "https://dustloop.com/wiki/api.php"
  timeout: 10000
  user_agent: "DustGrain 3.0.0-devel (https://github.com/cheiily/DustGrain; public@cheily.one) ktor-client-cio/3.4.1"

cargo_queries:
  - gbvsr:
    - MoveData_GBVSR:
      - input
      - name
      - note : parseWikitext

    - gbvsrCharacters:
      - name
      - health